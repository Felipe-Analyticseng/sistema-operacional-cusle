<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#486fa7">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Portal CUSLE">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <link rel="manifest" href="{{ url_for('static', filename='manifest.webmanifest') }}">
  <link rel="apple-touch-icon" href="{{ url_for('static', filename='img/logo_cusle.png') }}">
  <title>{% block title %}CUSLE{% endblock %}</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
  {% block head %}{% endblock %}
</head>
<body class="{{ body_class|default('') }}">
  <div class="page-shell">
    {% include 'partials/flash.html' %}
    {% block body %}{% endblock %}
  </div>
  <script src="{{ url_for('static', filename='js/main.js') }}"></script>
  <script>if('serviceWorker' in navigator){window.addEventListener('load',()=>navigator.serviceWorker.register('{{ url_for('static', filename='sw.js') }}').catch(()=>{}));}</script>
  {% block scripts %}{% endblock %}
</body>
</html>
