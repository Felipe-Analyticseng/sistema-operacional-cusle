{% extends 'base.html' %}
{% set body_class = 'login-bg' %}
{% block body %}
<main class="login-wrap">
  <section class="login-card">
    <img src="{{ url_for('static', filename='img/logo_cusle.png') }}" alt="CUSLE">
    <p class="eyebrow">Portal CUSLE</p>
    <h1>Acesso do filho</h1>
    <p>Entre com seu e-mail e senha para acessar as opções do portal.</p>
    <form method="post">
      <label>E-mail<input name="email" type="email" required></label>
      <label>Senha<input name="senha" type="password" required></label>
      <button class="btn" type="submit">Entrar</button>
    </form>
    <div class="login-links">
      <a href="{{ url_for('user.portal_register') }}">Registrar acesso</a>
      <a href="{{ url_for('user.portal_status') }}">Consultar status</a>
      <a href="{{ url_for('user.home') }}">Voltar ao portal</a>
    </div>
  </section>
</main>
{% endblock %}
